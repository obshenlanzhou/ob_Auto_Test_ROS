# Sample config_file_path YAML for Orbbec ROS launch verification.
# Adjust numeric values to match the connected camera model's supported ranges.

# Stream selection and stream profiles.
enable_color: true
color_width: 640
color_height: 480
color_fps: 30
color_format: MJPG

enable_depth: true
depth_width: 640
depth_height: 480
depth_fps: 30
depth_format: Y16

enable_left_ir: true
left_ir_width: 640
left_ir_height: 480
left_ir_fps: 30
left_ir_format: Y8

enable_right_ir: true
right_ir_width: 640
right_ir_height: 480
right_ir_fps: 30
right_ir_format: Y8

enable_accel: true
accel_rate: 100hz
accel_range: 4g
enable_accel_data_correction: true
enable_gyro: true
gyro_rate: 100hz
gyro_range: 1000dps
enable_gyro_data_correction: true
