profile_name: gemini_330_multi_shared
launch_file: orbbec_multicamera.launch.py

default_launch_args: {}

launch_scenarios: []

performance_topic_defaults:
  timeout: 15

multi_camera:
  enabled: true
  resource_mode: shared_container
  container_name: orbbec_container
  cameras:
    - name: G330_0
    - name: G330_1
    - name: G330_2
    - name: G330_3
  topic_templates:
    - name: /{camera}/color/image_raw
      type: sensor_msgs/msg/Image
      mode: message
      validator: image
      ideal_fps_key: color_fps
    - name: /{camera}/depth/image_raw
      type: sensor_msgs/msg/Image
      mode: message
      validator: image
      ideal_fps_key: depth_fps
    - name: /{camera}/left_ir/image_raw
      type: sensor_msgs/msg/Image
      mode: message
      validator: image
      ideal_fps_key: left_ir_fps
    - name: /{camera}/right_ir/image_raw
      type: sensor_msgs/msg/Image
      mode: message
      validator: image
      ideal_fps_key: right_ir_fps

performance_scenarios:
  - name: default
    description: Multi-camera stress test with cameras loaded into one shared component container.
    duration: 300
