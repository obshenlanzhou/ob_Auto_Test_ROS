profile_name: gemini_330_drop_frame
launch_file: gemini_330_series.launch.py

default_launch_args:
  camera_name: camera
  enable_frame_timestamp_csv: true
  frame_timestamp_csv_file: "{results_dir}/driver_frame_timestamp.csv"
  depth_width: 848
  depth_height: 480
  depth_fps: 30
  depth_format: Y16
  color_width: 1280
  color_height: 720
  color_fps: 30
  color_format: MJPG

launch_scenarios: []

performance_topic_defaults:
  timeout: 15

frame_timestamps:
  enabled: true
  flush_every_rows: 1000

performance_topics:
  - name: /camera/color/image_raw
    type: sensor_msgs/msg/Image
    mode: message
    validator: image
  - name: /camera/depth/image_raw
    type: sensor_msgs/msg/Image
    mode: message
    validator: image

performance_scenarios:
  - name: default
    description: default launch with driver and receiver frame timestamp recording for drop-frame analysis
    duration: 240
    launch_args: {}
    topics:
      - name: /camera/color/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
      - name: /camera/depth/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image

  - name: default_with_stress_ng_load
    description: default launch with stress-ng high load and driver plus receiver frame timestamp recording for drop-frame analysis
    duration: 240
    launch_args: {}
    topics:
      - name: /camera/color/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
      - name: /camera/depth/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
    load:
      type: stress-ng
      workers: 0

  - name: high_performance_launch
    description: high performance stream parameters with driver and receiver frame timestamp recording for drop-frame analysis
    duration: 180
    launch_args:
      color_fps: 30
      depth_fps: 30
      left_ir_fps: 30
      right_ir_fps: 30
      enable_point_cloud: true
      enable_left_ir: true
      enable_right_ir: true
    topics:
      - name: /camera/color/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
      - name: /camera/depth/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
