extends: base/depth_color_left_right_ir_performance.yaml

profile_name: gemini_330_series
launch_file: gemini_330_series.launch.py

default_launch_args:
  enable_point_cloud: true

performance_scenarios:
  - name: high_performance_launch
    launch_args:
      enable_point_cloud: true
    topics:
      - name: /{camera}/depth/points
        type: sensor_msgs/msg/PointCloud2
        mode: message
        validator: point_cloud

  - name: drop_frame_analysis
    description: enable driver frame timestamp csv and record receiver color and depth frame timestamps for drop-frame analysis
    duration: 300
    launch_args:
      enable_frame_timestamp_csv: true
      frame_timestamp_csv_file: "{results_dir}/driver_frame_timestamp.csv"
    frame_timestamps:
      enabled: true
      flush_every_rows: 1000
