default_launch_args:
  camera_name: camera
  enable_left_color: true
  enable_right_color: true

performance_topic_defaults:
  timeout: 10

performance_topics:
  - name: /{camera}/left_color/image_raw
    type: sensor_msgs/msg/Image
    mode: message
    validator: image
    ideal_fps_key: left_color_fps
  - name: /{camera}/right_color/image_raw
    type: sensor_msgs/msg/Image
    mode: message
    validator: image
    ideal_fps_key: right_color_fps

performance_scenarios:
  - name: default
    description: double color default launch
    duration: 240
    launch_args: {}

  - name: default_with_stress_ng_load
    description: double color launch with stress-ng high load to observe dropped frames
    duration: 240
    launch_args: {}
    load:
      type: stress-ng
      workers: 0

  - name: high_performance_launch
    description: double color high performance stream parameters
    duration: 180
    launch_args:
      enable_left_color: true
      enable_right_color: true
