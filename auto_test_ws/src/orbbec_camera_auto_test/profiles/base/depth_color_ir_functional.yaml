default_launch_args:
  camera_name: camera

launch_scenarios:
  - name: default
    launch_args: {}
    topic_defaults:
      timeout: 10
    topics:
      - name: /{camera}/color/camera_info
        type: sensor_msgs/msg/CameraInfo
        mode: message
        validator: camera_info_matches_image
        paired_topic: /{camera}/color/image_raw
      - name: /{camera}/color/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
      - name: /{camera}/color/image_raw/compressed
        type: sensor_msgs/msg/CompressedImage
        mode: advertised
      - name: /{camera}/color/metadata
        type: orbbec_camera_msgs/msg/Metadata
        mode: message
        validator: metadata

      - name: /{camera}/depth/camera_info
        type: sensor_msgs/msg/CameraInfo
        mode: message
        validator: camera_info_matches_image
        paired_topic: /{camera}/depth/image_raw
      - name: /{camera}/depth/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image
      - name: /{camera}/depth/image_raw/compressedDepth
        type: sensor_msgs/msg/CompressedImage
        mode: advertised
      - name: /{camera}/depth/metadata
        type: orbbec_camera_msgs/msg/Metadata
        mode: message
        validator: metadata
      - name: /{camera}/depth_filter_status
        type: std_msgs/msg/String
        mode: message
        validator: string_non_empty
        qos: transient_local

      - name: /{camera}/ir/camera_info
        type: sensor_msgs/msg/CameraInfo
        mode: message
        validator: camera_info_matches_image
        paired_topic: /{camera}/ir/image_raw
      - name: /{camera}/ir/image_raw
        type: sensor_msgs/msg/Image
        mode: message
        validator: image

      - name: /{camera}/device_status
        type: orbbec_camera_msgs/msg/DeviceStatus
        mode: message
        validator: device_status
      - name: /diagnostics
        type: diagnostic_msgs/msg/DiagnosticArray
        mode: advertised
      - name: /tf
        type: tf2_msgs/msg/TFMessage
        mode: advertised
      - name: /tf_static
        type: tf2_msgs/msg/TFMessage
        mode: message
        validator: tf_static
        qos: transient_local
    services:
      - name: /{camera}/get_device_info
        type: orbbec_camera_msgs/srv/GetDeviceInfo
        mode: read
        response_checks:
          - success_true
          - field_non_empty:info.name
          - field_non_empty:info.serial_number
      - name: /{camera}/get_sdk_version
        type: orbbec_camera_msgs/srv/GetString
        mode: read
        response_checks:
          - success_true
          - field_non_empty:data
      - name: /{camera}/save_images
        type: std_srvs/srv/Empty
        mode: artifact
        target_subdir: image
        min_new_files: 1
        wait_after_call: 5.0
        keepalive_topics:
          - name: /{camera}/color/image_raw
            type: sensor_msgs/msg/Image
          - name: /{camera}/depth/image_raw
            type: sensor_msgs/msg/Image
          - name: /{camera}/ir/image_raw
            type: sensor_msgs/msg/Image
      - name: /{camera}/reboot_device
        type: std_srvs/srv/Empty
        mode: reboot
